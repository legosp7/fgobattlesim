<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Servant Details</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1100px; margin: 2rem auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { border: 1px solid #ddd; padding: 0.6rem; text-align: left; vertical-align: top; }
        th { background: #f5f5f5; }
        .muted { color: #444; }
    </style>
</head>
<body>
<h1 th:text="${servant.name}">Servant Name</h1>
<ul>
    <li><strong>ID:</strong> <span th:text="${servant.id}"></span></li>
    <li><strong>Class:</strong> <span th:text="${servant.className}"></span></li>
    <li><strong>Rarity:</strong> <span th:text="${servant.rarity}"></span>★</li>
    <li><strong>Max ATK:</strong> <span th:text="${servant.atkMax}"></span></li>
    <li><strong>Max HP:</strong> <span th:text="${servant.hpMax}"></span></li>
    <li><strong>Primary Noble Phantasm:</strong> <span th:text="${noblePhantasmName}"></span></li>
</ul>

<h2>Skill level table</h2>
<form method="get" th:action="@{'/servants/' + ${servant.id}}" th:if="${!skillOptions.isEmpty()}">
    <label for="skillIndex">Choose a skill:</label>
    <select id="skillIndex" name="skillIndex">
        <option th:each="option : ${skillOptions}"
                th:value="${option.index()}"
                th:text="${option.label()}"
                th:selected="${selectedSkillIndex == option.index()}">
        </option>
    </select>
    <button type="submit">Show skill table</button>
</form>

<div th:if="${selectedSkillTable != null and !selectedSkillTable.rows().isEmpty()}">
    <h3 th:text="${selectedSkillTable.title()}">Selected skill</h3>
    <table>
        <thead>
        <tr>
            <th>Level</th>
            <th th:each="column : ${selectedSkillTable.columns()}" th:text="${column}">Value</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="row : ${selectedSkillTable.rows()}">
            <td th:text="${row.level()}">1</td>
            <td th:each="column : ${selectedSkillTable.columns()}"
                th:text="${row.values().containsKey(column) ? row.values().get(column) : '-'}">-</td>
        </tr>
        </tbody>
    </table>
</div>
<p th:if="${selectedSkillTable != null and selectedSkillTable.rows().isEmpty()}" class="muted">No level-based skill values were found for this skill.</p>

<h2>Noble Phantasms</h2>
<ul>
    <li th:each="npSummary : ${noblePhantasmSummaries}" th:text="${npSummary}"></li>
</ul>

<p><a th:href="@{'/'(servantId=${servant.id}, skillIndex=${selectedSkillIndex})}">Back to selector</a></p>
</body>
</html>
