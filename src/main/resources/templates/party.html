<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Party Builder</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1100px; margin: 2rem auto; }
        nav { margin-bottom: 1.5rem; }
        nav a { margin-right: 1rem; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin-top: 1rem; }
        .slot-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.35rem; }
        select { width: 100%; padding: 0.45rem; }
        button { margin-top: 1rem; padding: 0.55rem 0.85rem; }
        .muted { color: #444; }
    </style>
</head>
<body>
<nav>
    <a href="/">Servants</a>
    <a href="/party">Party</a>
</nav>

<h1>Party Builder</h1>
<p class="muted">Start with one party slot. Choose a class, then pick a servant from that class, then add a craft essence. Use the button at the bottom to add another servant slot.</p>

<form method="get" action="/party" id="partyForm">
    <input type="hidden" name="slots" th:value="${slots}" />

    <div class="card" th:each="slot : ${partySlots}">
        <h2 th:text="${'Party Slot ' + (slot.index() + 1)}">Party Slot</h2>
        <div class="slot-grid">
            <div>
                <label th:for="${'className-' + slot.index()}">Class</label>
                <select th:id="${'className-' + slot.index()}" name="className" onchange="this.form.submit()">
                    <option value="">-- Select class --</option>
                    <option th:each="classOption : ${classOptions}"
                            th:value="${classOption}"
                            th:text="${classOption}"
                            th:selected="${slot.selectedClassName() == classOption}">
                    </option>
                </select>
            </div>

            <div>
                <label th:for="${'servantId-' + slot.index()}">Servant</label>
                <select th:id="${'servantId-' + slot.index()}" name="servantId" onchange="this.form.submit()">
                    <option value="">-- Select servant --</option>
                    <option th:each="servant : ${slot.availableServants()}"
                            th:value="${servant.id()}"
                            th:text="${servant.name()}"
                            th:selected="${slot.selectedServantId() != null and slot.selectedServantId() == servant.id()}">
                    </option>
                </select>
            </div>

            <div>
                <label th:for="${'craftEssenceId-' + slot.index()}">Craft Essence</label>
                <select th:id="${'craftEssenceId-' + slot.index()}" name="craftEssenceId" onchange="this.form.submit()">
                    <option value="">-- Select craft essence --</option>
                    <option th:each="craftEssence : ${craftEssences}"
                            th:value="${craftEssence.id()}"
                            th:text="${craftEssence.name() + (craftEssence.rarity() != null ? ' (' + craftEssence.rarity() + '★)' : '')}"
                            th:selected="${slot.selectedCraftEssenceId() != null and slot.selectedCraftEssenceId() == craftEssence.id()}">
                    </option>
                </select>
            </div>
        </div>
    </div>

    <button type="submit" name="addSlot" value="true">Add another servant to party</button>
</form>
</body>
</html>
